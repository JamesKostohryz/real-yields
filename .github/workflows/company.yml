name: company-data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker (leave blank to use the TICKER cell in the bonds sheet)"
        required: false
        default: ""
      obs_category:
        description: "Obsolescence durability (A=durable, B=moderate, C=exposed)"
        required: false
        type: choice
        default: "B"
        options: ["A", "B", "C"]
      ory_override:
        description: "Obsolescence Risk Year override (optional; blank = use the category default)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # shared Google Sheet holding the one reusable bond tab (view-by-link)
  BONDS_SHEET_ID: "1KnbQFHWFXhZZ7Fy2rB1KplWT3GYblNlIEWDh7BzLOC4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull company data
        env:
          TICKER: "${{ github.event.inputs.ticker }}"
          OBS_CATEGORY: "${{ github.event.inputs.obs_category }}"
          ORY_OVERRIDE: "${{ github.event.inputs.ory_override }}"
        run: python -m asfp.run_company
