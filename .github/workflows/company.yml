name: company-data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker (leave blank to use the TICKER cell in the Cockpit sheet)"
        required: false
        default: ""
      obs_category:
        description: "Obsolescence durability (A=durable, B=moderate, C=exposed)"
        required: false
        type: choice
        default: "B"
        options: ["A", "B", "C"]
      ory_override:
        description: "Obsolescence Risk Year override (optional; blank = use the category default)"
        required: false
        default: ""

permissions:
  contents: write

# The Cockpit Google Sheet drives the run: put the ticker in its TICKER cell.
# You keep the TICKER cell but LEAVE THE BOND ROWS EMPTY — EODHD now supplies the
# bonds. With no bond rows in the sheet, run_company falls back to the committed
# bonds/<TICKER>.csv, which the "Refresh bonds from EODHD" step regenerates first.
env:
  BONDS_SHEET_ID: "1KnbQFHWFXhZZ7Fy2rB1KplWT3GYblNlIEWDh7BzLOC4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull this issuer's bonds from EODHD and rewrite bonds/<TICKER>.csv.
      # It reads the ticker from the workflow box if given, else the sheet's
      # TICKER cell (same reader run_company uses). Safe no-op on any error.
      - name: Refresh bonds from EODHD
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TICKER: "${{ github.event.inputs.ticker }}"
        run: python refresh_bonds.py

      - name: Pull company data
        env:
          TICKER: "${{ github.event.inputs.ticker }}"
          OBS_CATEGORY: "${{ github.event.inputs.obs_category }}"
          ORY_OVERRIDE: "${{ github.event.inputs.ory_override }}"
        run: python -m asfp.run_company

      # Decision B (ERP 0700): the valuation basis is ERP's forward curve, not the
      # pipeline's own real curve / variance ERP. Re-apply it on top of what the
      # generator just wrote, BEFORE the commit — otherwise this job silently
      # reverts the decision (asfp-bot b701da3 did exactly that, leaving the engine
      # discounting at pipeline-rf + ERP-erp). No-op if history/ERP_OVERLAY.json is
      # absent; fails the job loudly rather than committing a wrong rate.
      - name: Apply ERP forward-curve overlay (Decision B)
        run: python apply_erp_overlay.py

      - name: Commit
        run: |
          git config user.name "asfp-bot"
          git config user.email "asfp-bot@users.noreply.github.com"
          git add outputs/ bonds/
          git commit -m "company data update" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push
