name: company-data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker (leave blank to use the TICKER cell in the bonds sheet)"
        required: false
        default: ""
      obs_category:
        description: "Obsolescence durability (A=durable, B=moderate, C=exposed)"
        required: false
        type: choice
        default: "B"
        options: ["A", "B", "C"]
      ory_override:
        description: "Obsolescence Risk Year override (optional; blank = use the category default)"
        required: false
        default: ""

permissions:
  contents: write

# NOTE: BONDS_SHEET_ID was removed on purpose. With it gone, run_company reads the
# committed bonds/<TICKER>.csv file — which the new "Refresh bonds from EODHD" step
# regenerates automatically. That is what retires the manual TradingView paste.
# (If you ever want to hand-edit a company's bonds again, drop a bonds/<T>.csv in
#  the repo; any ticker NOT in refresh_bonds.py is left exactly as committed.)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NEW: pull this issuer's bonds straight from EODHD and rewrite
      # bonds/<TICKER>.csv. Safe no-op for tickers not configured in
      # refresh_bonds.py or if the key/ticker is missing.
      - name: Refresh bonds from EODHD
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TICKER: "${{ github.event.inputs.ticker }}"
        run: python refresh_bonds.py

      - name: Pull company data
        env:
          TICKER: "${{ github.event.inputs.ticker }}"
          OBS_CATEGORY: "${{ github.event.inputs.obs_category }}"
          ORY_OVERRIDE: "${{ github.event.inputs.ory_override }}"
        run: python -m asfp.run_company

      - name: Commit
        run: |
          git config user.name "asfp-bot"
          git config user.email "asfp-bot@users.noreply.github.com"
          git add outputs/ bonds/
          git commit -m "company data update" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push
