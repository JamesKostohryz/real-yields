name: company-data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker (leave blank to use the TICKER cell in the bonds sheet)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # shared Google Sheet holding the one reusable bond tab (view-by-link)
  BONDS_SHEET_ID: "1KnbQFHWFXhZZ7Fy2rB1KplWT3GYblNlIEWDh7BzLOC4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull company data
        env:
          TICKER: "${{ github.event.inputs.ticker }}"
        run: python -m asfp.run_company

      - name: Commit
        run: |
          git config user.name "asfp-bot"
          git config user.email "asfp-bot@users.noreply.github.com"
          git add outputs/
          git commit -m "company data update" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push
