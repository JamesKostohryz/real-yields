name: weekly-real-yields

on:
  schedule:
    - cron: "0 12 * * 3"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build curves
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m asfp.run

      - name: Commit refreshed outputs
        run: |
          git config user.name "asfp-bot"
          git config user.email "asfp-bot@users.noreply.github.com"
          git add outputs/
          git commit -m "weekly update" || echo "no changes to commit"
          git push
