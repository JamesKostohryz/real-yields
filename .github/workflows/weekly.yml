name: weekly-real-yields

on:
  schedule:
    # every weekday at 12:00 UTC (~7am Central); rolls the curve to the latest
    # daily FRED data. GSW itself only updates weekly, but the daily nominal/real
    # moves roll it forward in between.
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build curves
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m asfp.run

      # Decision B (ERP 0700): the valuation basis is ERP's forward curve, not the
      # pipeline's own real curve / variance ERP. Re-apply it on top of what the
      # generator just wrote, BEFORE the commit — otherwise this job silently
      # reverts the decision (asfp-bot b701da3 did exactly that, leaving the engine
      # discounting at pipeline-rf + ERP-erp). No-op if history/ERP_OVERLAY.json is
      # absent; fails the job loudly rather than committing a wrong rate.
      - name: Apply ERP forward-curve overlay (Decision B)
        run: python apply_erp_overlay.py

      - name: Commit refreshed outputs
        run: |
          git config user.name "asfp-bot"
          git config user.email "asfp-bot@users.noreply.github.com"
          git add outputs/
          git commit -m "update $(date -u +%F)" || echo "no changes to commit"
          git pull --rebase --autostash origin main || true
          git push
