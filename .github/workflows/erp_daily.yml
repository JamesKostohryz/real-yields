name: erp-daily-close (DISPATCH-ONLY — not yet scheduled)

# STATUS: staged, NOT live. There is deliberately NO `schedule:` trigger.
# James's 2026-07-22 decision moves the ERP "today" curve from a frozen monthly
# vintage to a daily-close rebuild (build_erp_daily.py, v4 engine). Until ERP
# confirms the two remaining production inputs and posts a GREEN acceptance gate,
# June-2026 stays the committed basis and this job stays manual-only.
#
# BEFORE this can be flipped to scheduled (add a cron here), ERP still owes:
#   1. daily 1y short-end feed  (nominal-1y minus held 1y breakeven)
#   2. S&P 500 price deflator confirmed for norm_ey (normalized_X4 / real_price_close)
#   3. the daily RUNNER wrapper: build_erp_daily.py as posted is a LIBRARY + local
#      self-test only. It has no daily-input fetch and does not WRITE the output
#      contract (history/TODAY_forward_curve_latest.csv + history/ERP_effective_latest.csv).
#      That writer must be added before a scheduled run produces anything.
#   4. gate fixtures in-repo: the __main__ self-test reads /tmp/shiller/shiller.csv
#      and TODAY_forward_curve_2026-06.csv, neither of which is committed. The gate
#      step below is fail-closed and will stay RED until those land — by design.
#
# When all four are in and the gate is green, ERP will confirm and EXEC adds the
# cron + retunes the staleness guard (45d -> ~3 business days) in the SAME change.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke — v4 library loads (fail-closed on import/precompute)
        run: python -c "import build_erp_daily as b; print('build_erp_daily import OK; params locked, TMAX=%d' % b.TMAX)"

      - name: Acceptance gate (fail-closed; reproduces committed June to <1bp)
        # Requires the two fixtures noted in the header. RED until ERP commits them.
        run: python build_erp_daily.py
